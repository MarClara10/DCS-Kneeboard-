<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>DCS CheckPad</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020503;
        --panel: #06100a;
        --panel-2: #08170d;
        --line: #164f2d;
        --line-soft: rgba(47, 190, 92, 0.28);
        --text: #a8ffbd;
        --bright: #28ff6a;
        --muted: #4e9d66;
        --danger: #ff5f4d;
        --cyan: #52ffe4;
        --amber: #ffd15a;
      }

      * {
        box-sizing: border-box;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      }

      body {
        background:
          linear-gradient(rgba(40, 255, 106, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(40, 255, 106, 0.025) 1px, transparent 1px),
          radial-gradient(circle at 52% -20%, rgba(40, 255, 106, 0.08), transparent 36%),
          #020503;
        background-size: 38px 38px, 38px 38px, auto;
      }

      button,
      input {
        font: inherit;
      }

      button {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 0;
        padding: 0 11px;
        color: var(--text);
        background: rgba(6, 16, 10, 0.86);
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.72rem;
      }

      button:active {
        transform: translateY(1px);
      }

      button.is-active {
        color: #001b08;
        border-color: var(--bright);
        background: var(--bright);
      }

      button.danger {
        color: #ffd6d1;
        border-color: rgba(255, 95, 77, 0.78);
      }

      input[type="file"] {
        display: none;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--bright);
      }

      input[type="color"] {
        width: 100%;
        height: 34px;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 0;
        background: var(--panel);
      }

      .app {
        height: 100%;
        display: grid;
        grid-template-rows: 38px minmax(0, 1fr);
      }

      .command-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 5px 10px;
        border-bottom: 1px solid var(--line);
        background: rgba(2, 5, 3, 0.92);
      }

      .logo {
        margin-right: auto;
        color: var(--bright);
        font-weight: 900;
        letter-spacing: 0.34em;
        font-size: 0.86rem;
      }

      .status {
        color: var(--muted);
        font-size: 0.68rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .layout {
        min-height: 0;
        display: grid;
        grid-template-columns: 246px minmax(0, 1fr);
      }

      .rail {
        min-height: 0;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--line);
        background: rgba(6, 16, 10, 0.72);
      }

      .control-block {
        display: grid;
        gap: 8px;
        padding: 10px;
        border-bottom: 1px solid var(--line-soft);
      }

      .control-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .control-grid.three {
        grid-template-columns: repeat(3, 1fr);
      }

      .wide {
        grid-column: 1 / -1;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field.wide {
        grid-column: 1 / -1;
      }

      .field span {
        color: var(--muted);
        font-size: 0.66rem;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .page-list {
        overflow-x: auto;
        overflow-y: hidden;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: 178px;
        gap: 7px;
        padding: 8px 10px;
        border-top: 1px solid var(--line);
        background: rgba(2, 5, 3, 0.9);
      }

      .page-tile {
        width: 178px;
        min-height: 58px;
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr);
        gap: 9px;
        align-items: center;
        text-align: left;
        letter-spacing: 0;
        text-transform: none;
      }

      .page-tile img {
        width: 44px;
        height: 44px;
        object-fit: cover;
        background: #000;
        border: 1px solid var(--line-soft);
        -webkit-user-drag: none;
        user-drag: none;
        pointer-events: none;
      }

      .page-tile strong {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
        font-size: 0.78rem;
      }

      .page-tile span {
        color: var(--muted);
        font-size: 0.68rem;
      }

      .workspace {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        position: relative;
      }

      .viewer,
      .notes-page {
        min-width: 0;
        min-height: 0;
        overflow: auto;
        padding: 14px;
      }

      .viewer {
        display: grid;
        place-items: start center;
      }

      .spread,
      .page-frame,
      .notes-frame {
        border: 1px solid var(--line);
        background: #000;
        box-shadow: 0 0 0 1px rgba(40, 255, 106, 0.06), 0 24px 90px rgba(0, 0, 0, 0.7);
      }

      .spread {
        width: min(100%, 1320px);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1px;
        background: var(--line);
      }

      .page-frame img {
        display: block;
        width: 100%;
        height: auto;
        -webkit-user-drag: none;
        user-drag: none;
        pointer-events: none;
      }

      .notes-page {
        display: grid;
        place-items: start;
      }

      .notes-frame {
        position: relative;
        width: 2200px;
        height: 1500px;
        background:
          linear-gradient(rgba(40, 255, 106, 0.12) 1px, transparent 1px),
          linear-gradient(90deg, rgba(40, 255, 106, 0.1) 1px, transparent 1px),
          var(--note-bg, #06100a);
        background-size: 24px 24px;
      }

      #notesCanvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: pan-x pan-y;
      }

      .selection-box {
        position: absolute;
        display: none;
        border: 1px dashed var(--cyan);
        background: rgba(82, 255, 228, 0.06);
        pointer-events: none;
      }

      .empty {
        width: min(420px, calc(100% - 28px));
        margin-top: 14vh;
        padding: 28px;
        border: 1px dashed var(--line);
        background: rgba(6, 16, 10, 0.62);
        text-align: center;
      }

      .empty h1 {
        margin: 0;
        color: var(--bright);
        font-size: 1.2rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .empty p {
        margin: 14px auto 0;
        max-width: 460px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 0.78rem;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 820px) {
        .app {
          grid-template-rows: 42px minmax(0, 1fr);
        }

        .command-bar {
          gap: 6px;
          overflow-x: auto;
        }

        .logo {
          letter-spacing: 0.18em;
          font-size: 0.78rem;
        }

        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }

        .rail {
          max-height: 218px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .control-block {
          padding: 8px;
        }

        .spread {
          width: max-content;
          min-width: 980px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="command-bar">
        <div class="logo">DCS CHECKPAD</div>
        <button id="checklistModeBtn" class="is-active" type="button">Checklist</button>
        <button id="notesModeBtn" type="button">Notizen</button>
        <span id="saveStatus" class="status">bereit</span>
      </header>

      <div class="layout">
        <aside class="rail">
          <div class="control-block">
            <label>
              <input id="fileInput" type="file" accept="image/*" multiple />
              <button id="importBtn" class="wide" type="button">Load Package</button>
            </label>
            <div class="control-grid">
              <button id="prevBtn" type="button">Prev</button>
              <button id="nextBtn" type="button">Next</button>
            </div>
          </div>

          <div id="notesTools" class="control-block hidden">
            <div class="control-grid three">
              <button class="tool is-active" data-tool="pen" type="button">Stift</button>
              <button class="tool" data-tool="marker" type="button">Marker</button>
              <button class="tool" data-tool="eraser" type="button">Radierer</button>
              <button class="tool wide" data-tool="lasso" type="button">Lasso</button>
            </div>

            <label class="field wide">
              <span>Stiftfarbe</span>
              <input id="colorInput" type="color" value="#52ffe4" />
            </label>
            <label class="field wide">
              <span>Hintergrund</span>
              <input id="backgroundInput" type="color" value="#06100a" />
            </label>
            <label class="field wide">
              <span>Stiftstaerke <b id="penSizeLabel">5</b></span>
              <input id="penSizeInput" type="range" min="1" max="32" value="5" />
            </label>
            <label class="field wide">
              <span>Radierer <b id="eraserSizeLabel">28</b></span>
              <input id="eraserSizeInput" type="range" min="8" max="90" value="28" />
            </label>
            <div class="control-grid">
              <button id="undoBtn" type="button">Undo</button>
              <button id="clearNotesBtn" class="danger" type="button">Clear</button>
            </div>
          </div>

          <div class="control-block">
            <button id="exportBtn" type="button">Backup Export</button>
            <label>
              <input id="backupInput" type="file" accept="application/json" />
              <button id="importBackupBtn" type="button">Backup Import</button>
            </label>
          </div>
        </aside>

        <section class="workspace">
          <div id="viewer" class="viewer">
            <div id="emptyState" class="empty">
              <h1>Import Checklists</h1>
            </div>
            <div id="pageFrame" class="spread hidden">
              <div class="page-frame">
                <img id="pageImageA" alt="Aktuelle Checkliste links" draggable="false" />
              </div>
              <div class="page-frame">
                <img id="pageImageB" alt="Aktuelle Checkliste rechts" draggable="false" />
              </div>
            </div>
          </div>

          <div id="notesPage" class="notes-page hidden">
            <div class="notes-frame">
              <canvas id="notesCanvas" aria-label="Notizseite fuer Apple Pencil"></canvas>
              <div id="selectionBox" class="selection-box"></div>
            </div>
          </div>

          <div id="pageList" class="page-list" aria-label="Importierte Checklisten"></div>
        </section>
      </div>
    </main>

    <script>
      const DB_NAME = "dcs-checkpad";
      const DB_VERSION = 2;
      const PAGE_STORE = "pages";
      const NOTE_STORE = "notes";
      const NOTE_ID = "main";

      const els = {
        fileInput: document.querySelector("#fileInput"),
        importBtn: document.querySelector("#importBtn"),
        backupInput: document.querySelector("#backupInput"),
        importBackupBtn: document.querySelector("#importBackupBtn"),
        exportBtn: document.querySelector("#exportBtn"),
        pageList: document.querySelector("#pageList"),
        pageImageA: document.querySelector("#pageImageA"),
        pageImageB: document.querySelector("#pageImageB"),
        pageFrame: document.querySelector("#pageFrame"),
        selectionBox: document.querySelector("#selectionBox"),
        emptyState: document.querySelector("#emptyState"),
        viewer: document.querySelector("#viewer"),
        notesPage: document.querySelector("#notesPage"),
        notesTools: document.querySelector("#notesTools"),
        notesCanvas: document.querySelector("#notesCanvas"),
        notesFrame: document.querySelector(".notes-frame"),
        saveStatus: document.querySelector("#saveStatus"),
        checklistModeBtn: document.querySelector("#checklistModeBtn"),
        notesModeBtn: document.querySelector("#notesModeBtn"),
        prevBtn: document.querySelector("#prevBtn"),
        nextBtn: document.querySelector("#nextBtn"),
        undoBtn: document.querySelector("#undoBtn"),
        clearNotesBtn: document.querySelector("#clearNotesBtn"),
        colorInput: document.querySelector("#colorInput"),
        backgroundInput: document.querySelector("#backgroundInput"),
        penSizeInput: document.querySelector("#penSizeInput"),
        eraserSizeInput: document.querySelector("#eraserSizeInput"),
        penSizeLabel: document.querySelector("#penSizeLabel"),
        eraserSizeLabel: document.querySelector("#eraserSizeLabel"),
        tools: document.querySelectorAll(".tool"),
      };

      const notesCtx = els.notesCanvas.getContext("2d");
      let db;
      let pages = [];
      let currentIndex = -1;
      let mode = "checklist";
      let currentTool = "pen";
      let isDrawing = false;
      let lastPoint = null;
      let undoStack = [];
      let saveTimer = 0;
      let noteImage = "";
      let lasso = null;

      document.addEventListener("contextmenu", (event) => event.preventDefault());
      document.addEventListener("selectstart", (event) => event.preventDefault());
      document.addEventListener("dragstart", (event) => event.preventDefault());

      function openDb() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onupgradeneeded = () => {
            const database = request.result;
            if (!database.objectStoreNames.contains(PAGE_STORE)) {
              database.createObjectStore(PAGE_STORE, { keyPath: "id" });
            }
            if (!database.objectStoreNames.contains(NOTE_STORE)) {
              database.createObjectStore(NOTE_STORE, { keyPath: "id" });
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      function storePut(storeName, value) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, "readwrite");
          tx.objectStore(storeName).put(value);
          tx.oncomplete = resolve;
          tx.onerror = () => reject(tx.error);
        });
      }

      function storeGet(storeName, id) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, "readonly");
          const request = tx.objectStore(storeName).get(id);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      function storeAll(storeName) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, "readonly");
          const request = tx.objectStore(storeName).getAll();
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      function setStatus(text) {
        els.saveStatus.textContent = text;
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(file);
        });
      }

      function sortFiles(fileList) {
        return [...fileList].sort((a, b) =>
          a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: "base" })
        );
      }

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => {
          const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
          return map[char];
        });
      }

      async function importFiles(fileList) {
        const files = sortFiles(fileList).filter((file) => file.type.startsWith("image/"));
        if (!files.length) return;

        setStatus("loading");
        for (const file of files) {
          const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
          await storePut(PAGE_STORE, {
            id,
            name: file.name,
            image: await fileToDataUrl(file),
            createdAt: Date.now(),
          });
        }

        await loadPages();
        if (currentIndex === -1) selectPage(0);
        setStatus("saved");
      }

      async function loadPages() {
        pages = await storeAll(PAGE_STORE);
        pages.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: "base" }));
        renderPageList();
      }

      function renderPageList() {
        els.pageList.innerHTML = "";
        pages.forEach((page, index) => {
          const button = document.createElement("button");
          button.className = `page-tile${index === currentIndex ? " is-active" : ""}`;
          button.type = "button";
          button.innerHTML = `
            <img src="${page.image}" alt="" draggable="false" />
            <span><strong>${escapeHtml(page.name)}</strong><span>${index + 1}/${pages.length}</span></span>
          `;
          button.addEventListener("click", () => selectPage(index));
          els.pageList.append(button);
        });
      }

      function selectPage(index) {
        if (index < 0 || index >= pages.length) return;
        currentIndex = index;
        els.pageImageA.src = pages[currentIndex].image;
        els.pageImageB.src = pages[currentIndex + 1] ? pages[currentIndex + 1].image : "";
        els.pageImageB.parentElement.classList.toggle("hidden", !pages[currentIndex + 1]);
        els.pageFrame.classList.remove("hidden");
        els.emptyState.classList.add("hidden");
        renderPageList();
        setMode("checklist");
      }

      function setMode(nextMode) {
        mode = nextMode;
        const isNotes = mode === "notes";
        els.viewer.classList.toggle("hidden", isNotes);
        els.notesPage.classList.toggle("hidden", !isNotes);
        els.notesTools.classList.toggle("hidden", !isNotes);
        els.checklistModeBtn.classList.toggle("is-active", !isNotes);
        els.notesModeBtn.classList.toggle("is-active", isNotes);
        if (isNotes) resizeNotesCanvas();
        hideSelection();
      }

      function resizeNotesCanvas() {
        const rect = els.notesCanvas.getBoundingClientRect();
        const width = Math.max(900, Math.round(rect.width));
        const height = Math.max(675, Math.round(rect.height));
        if (els.notesCanvas.width === width && els.notesCanvas.height === height) return;

        const oldImage = els.notesCanvas.width ? els.notesCanvas.toDataURL("image/png") : noteImage;
        els.notesCanvas.width = width;
        els.notesCanvas.height = height;
        clearCanvas();
        if (oldImage) drawSavedNote(oldImage);
      }

      function clearCanvas() {
        notesCtx.clearRect(0, 0, els.notesCanvas.width, els.notesCanvas.height);
      }

      function setNoteBackground(color) {
        els.notesFrame.style.setProperty("--note-bg", color);
      }

      function drawSavedNote(dataUrl) {
        const image = new Image();
        image.onload = () => {
          notesCtx.drawImage(image, 0, 0, els.notesCanvas.width, els.notesCanvas.height);
        };
        image.src = dataUrl;
      }

      async function loadNotes() {
        const data = await storeGet(NOTE_STORE, NOTE_ID);
        if (!data) {
          await storePut(NOTE_STORE, {
            id: NOTE_ID,
            background: els.backgroundInput.value,
            drawing: "",
            updatedAt: Date.now(),
          });
          return;
        }
        els.backgroundInput.value = data.background || "#06100a";
        setNoteBackground(els.backgroundInput.value);
        noteImage = data.drawing || "";
      }

      function scheduleSave() {
        window.clearTimeout(saveTimer);
        setStatus("saving");
        saveTimer = window.setTimeout(saveNotes, 220);
      }

      async function saveNotes() {
        if (!db) return;
        noteImage = els.notesCanvas.toDataURL("image/png");
        await storePut(NOTE_STORE, {
          id: NOTE_ID,
          background: els.backgroundInput.value,
          drawing: noteImage,
          updatedAt: Date.now(),
        });
        setStatus("saved");
      }

      function pointerToCanvas(event) {
        const rect = els.notesCanvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * els.notesCanvas.width,
          y: ((event.clientY - rect.top) / rect.height) * els.notesCanvas.height,
        };
      }

      function allowDrawing(event) {
        if (event.pointerType === "touch") return false;
        if (navigator.maxTouchPoints > 0) return event.pointerType === "pen";
        return event.pointerType === "pen" || event.pointerType === "mouse";
      }

      function pushUndo() {
        undoStack.push(notesCtx.getImageData(0, 0, els.notesCanvas.width, els.notesCanvas.height));
        if (undoStack.length > 20) undoStack.shift();
      }

      function normalizeRect(start, end) {
        return {
          x: Math.max(0, Math.min(start.x, end.x)),
          y: Math.max(0, Math.min(start.y, end.y)),
          width: Math.abs(end.x - start.x),
          height: Math.abs(end.y - start.y),
        };
      }

      function canvasRectToCss(rect) {
        const box = els.notesCanvas.getBoundingClientRect();
        return {
          left: (rect.x / els.notesCanvas.width) * box.width,
          top: (rect.y / els.notesCanvas.height) * box.height,
          width: (rect.width / els.notesCanvas.width) * box.width,
          height: (rect.height / els.notesCanvas.height) * box.height,
        };
      }

      function showSelection(rect) {
        const css = canvasRectToCss(rect);
        els.selectionBox.style.display = "block";
        els.selectionBox.style.left = `${css.left}px`;
        els.selectionBox.style.top = `${css.top}px`;
        els.selectionBox.style.width = `${css.width}px`;
        els.selectionBox.style.height = `${css.height}px`;
      }

      function hideSelection() {
        els.selectionBox.style.display = "none";
        lasso = null;
      }

      function pointInRect(point, rect) {
        return point.x >= rect.x && point.x <= rect.x + rect.width && point.y >= rect.y && point.y <= rect.y + rect.height;
      }

      function configureStroke() {
        const penSize = Number(els.penSizeInput.value);
        const eraserSize = Number(els.eraserSizeInput.value);
        notesCtx.lineCap = "round";
        notesCtx.lineJoin = "round";
        notesCtx.globalAlpha = currentTool === "marker" ? 0.28 : 1;
        notesCtx.globalCompositeOperation = currentTool === "eraser" ? "destination-out" : "source-over";
        notesCtx.lineWidth = currentTool === "eraser" ? eraserSize : currentTool === "marker" ? penSize * 3 : penSize;
        notesCtx.strokeStyle = els.colorInput.value;
        notesCtx.fillStyle = els.colorInput.value;
      }

      function drawPoint(point) {
        configureStroke();
        notesCtx.beginPath();
        notesCtx.arc(point.x, point.y, notesCtx.lineWidth / 2, 0, Math.PI * 2);
        notesCtx.fill();
        resetStroke();
      }

      function drawLine(from, to) {
        configureStroke();
        notesCtx.beginPath();
        notesCtx.moveTo(from.x, from.y);
        notesCtx.lineTo(to.x, to.y);
        notesCtx.stroke();
        resetStroke();
      }

      function resetStroke() {
        notesCtx.globalAlpha = 1;
        notesCtx.globalCompositeOperation = "source-over";
      }

      function startDrawing(event) {
        if (mode !== "notes" || !allowDrawing(event)) return;
        event.preventDefault();
        els.notesCanvas.setPointerCapture(event.pointerId);
        isDrawing = true;
        lastPoint = pointerToCanvas(event);

        if (currentTool === "lasso") {
          if (lasso?.imageData && pointInRect(lastPoint, lasso.rect)) {
            lasso.mode = "move";
            lasso.offset = { x: lastPoint.x - lasso.rect.x, y: lastPoint.y - lasso.rect.y };
            pushUndo();
            notesCtx.clearRect(lasso.rect.x, lasso.rect.y, lasso.rect.width, lasso.rect.height);
            return;
          }
          hideSelection();
          lasso = { mode: "select", start: lastPoint, rect: { x: lastPoint.x, y: lastPoint.y, width: 0, height: 0 } };
          return;
        }

        hideSelection();
        pushUndo();
        drawPoint(lastPoint);
      }

      function moveDrawing(event) {
        if (!isDrawing || !lastPoint || !allowDrawing(event)) return;
        event.preventDefault();
        const point = pointerToCanvas(event);

        if (currentTool === "lasso" && lasso?.mode === "select") {
          lasso.rect = normalizeRect(lasso.start, point);
          showSelection(lasso.rect);
          lastPoint = point;
          return;
        }

        if (currentTool === "lasso" && lasso?.mode === "move" && lasso.imageData) {
          const nextRect = {
            x: Math.max(0, Math.min(els.notesCanvas.width - lasso.rect.width, point.x - lasso.offset.x)),
            y: Math.max(0, Math.min(els.notesCanvas.height - lasso.rect.height, point.y - lasso.offset.y)),
            width: lasso.rect.width,
            height: lasso.rect.height,
          };
          notesCtx.putImageData(lasso.imageData, nextRect.x, nextRect.y);
          if (lastPoint) {
            const previousRect = lasso.rect;
            const previousImage = lasso.imageData;
            notesCtx.clearRect(previousRect.x, previousRect.y, previousRect.width, previousRect.height);
            notesCtx.putImageData(previousImage, nextRect.x, nextRect.y);
          }
          lasso.rect = nextRect;
          showSelection(lasso.rect);
          lastPoint = point;
          return;
        }

        drawLine(lastPoint, point);
        lastPoint = point;
      }

      function stopDrawing(event) {
        if (!isDrawing) return;
        if (event && els.notesCanvas.hasPointerCapture(event.pointerId)) {
          els.notesCanvas.releasePointerCapture(event.pointerId);
        }
        isDrawing = false;
        lastPoint = null;

        if (currentTool === "lasso" && lasso?.mode === "select") {
          if (lasso.rect.width > 8 && lasso.rect.height > 8) {
            lasso.imageData = notesCtx.getImageData(lasso.rect.x, lasso.rect.y, lasso.rect.width, lasso.rect.height);
            lasso.mode = "ready";
            showSelection(lasso.rect);
          } else {
            hideSelection();
          }
          return;
        }

        if (currentTool === "lasso" && lasso?.mode === "move") {
          lasso.imageData = notesCtx.getImageData(lasso.rect.x, lasso.rect.y, lasso.rect.width, lasso.rect.height);
          lasso.mode = "ready";
          showSelection(lasso.rect);
          scheduleSave();
          return;
        }

        scheduleSave();
      }

      function setTool(tool) {
        currentTool = tool;
        els.tools.forEach((button) => button.classList.toggle("is-active", button.dataset.tool === tool));
      }

      async function exportBackup() {
        await saveNotes();
        const backup = {
          version: 2,
          exportedAt: new Date().toISOString(),
          pages: await storeAll(PAGE_STORE),
          notes: await storeAll(NOTE_STORE),
        };
        const blob = new Blob([JSON.stringify(backup)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `dcs-checkpad-backup-${new Date().toISOString().slice(0, 10)}.json`;
        link.click();
        URL.revokeObjectURL(url);
      }

      async function importBackup(file) {
        if (!file) return;
        const backup = JSON.parse(await file.text());
        if (!Array.isArray(backup.pages)) return;
        setStatus("import");
        for (const page of backup.pages) await storePut(PAGE_STORE, page);
        const notes = backup.notes || backup.pageData || [];
        for (const note of notes) {
          if (note.id === NOTE_ID || note.drawing) {
            await storePut(NOTE_STORE, {
              id: NOTE_ID,
              background: note.background || els.backgroundInput.value,
              drawing: note.drawing || "",
              updatedAt: Date.now(),
            });
            break;
          }
        }
        await loadNotes();
        await loadPages();
        if (pages.length) selectPage(0);
        setStatus("saved");
      }

      els.importBtn.addEventListener("click", () => els.fileInput.click());
      els.fileInput.addEventListener("change", () => importFiles(els.fileInput.files));
      els.importBackupBtn.addEventListener("click", () => els.backupInput.click());
      els.backupInput.addEventListener("change", () => importBackup(els.backupInput.files[0]));
      els.exportBtn.addEventListener("click", exportBackup);
      els.prevBtn.addEventListener("click", () => selectPage(currentIndex - 1));
      els.nextBtn.addEventListener("click", () => selectPage(currentIndex + 1));
      els.checklistModeBtn.addEventListener("click", () => setMode("checklist"));
      els.notesModeBtn.addEventListener("click", () => setMode("notes"));

      els.tools.forEach((button) => {
        button.addEventListener("click", () => setTool(button.dataset.tool));
      });

      els.penSizeInput.addEventListener("input", () => {
        els.penSizeLabel.textContent = els.penSizeInput.value;
      });

      els.eraserSizeInput.addEventListener("input", () => {
        els.eraserSizeLabel.textContent = els.eraserSizeInput.value;
      });

      els.backgroundInput.addEventListener("input", () => {
        setNoteBackground(els.backgroundInput.value);
        scheduleSave();
      });

      els.undoBtn.addEventListener("click", () => {
        const previous = undoStack.pop();
        if (!previous) return;
        notesCtx.putImageData(previous, 0, 0);
        scheduleSave();
      });

      els.clearNotesBtn.addEventListener("click", () => {
        pushUndo();
        clearCanvas();
        scheduleSave();
      });

      els.notesCanvas.addEventListener("pointerdown", startDrawing);
      els.notesCanvas.addEventListener("pointermove", moveDrawing);
      els.notesCanvas.addEventListener("pointerup", stopDrawing);
      els.notesCanvas.addEventListener("pointercancel", stopDrawing);

      window.addEventListener("resize", () => {
        if (mode === "notes") resizeNotesCanvas();
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") selectPage(currentIndex - 1);
        if (event.key === "ArrowRight") selectPage(currentIndex + 1);
        if (event.key.toLowerCase() === "n") setMode("notes");
        if (event.key.toLowerCase() === "c") setMode("checklist");
        if (event.key.toLowerCase() === "z" && (event.ctrlKey || event.metaKey)) els.undoBtn.click();
      });

      openDb()
        .then(async (database) => {
          db = database;
          await loadNotes();
          await loadPages();
          if (pages.length) selectPage(0);
          resizeNotesCanvas();
          setStatus("ready");
        })
        .catch(() => {
          setStatus("db error");
        });
    </script>
  </body>
</html>
